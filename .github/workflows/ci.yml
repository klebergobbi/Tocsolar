name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Prisma Client é necessário para o typecheck/build da API.
      - name: Prisma generate
        run: pnpm --filter api exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
